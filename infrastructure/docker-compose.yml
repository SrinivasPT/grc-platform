networks:
  grc_net:
    driver: bridge

volumes:
  grc_sqlserver_data:
  grc_neo4j_data:
  grc_neo4j_logs:
  grc_redis_data:
  grc_keycloak_data:

services:

  # ─── SQL Server 2025 ──────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: grc_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - grc_sqlserver_data:/var/opt/mssql
      - ./sqlserver/init:/docker-entrypoint-initdb.d
    networks:
      - grc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -Q 'SELECT 1' -No || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Neo4j 5.x LTS ───────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-enterprise
    container_name: grc_neo4j
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH}"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - grc_neo4j_data:/data
      - grc_neo4j_logs:/logs
    networks:
      - grc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Redis 7.x ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grc_redis
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - grc_redis_data:/data
    networks:
      - grc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Keycloak 24.x ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: grc_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME}"
      KC_HTTP_PORT: "8080"
      KC_DB: dev-mem
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - grc_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && echo ok || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
